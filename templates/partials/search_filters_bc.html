<div class="container-fluid py-3">
    <!-- Heading + tiny help -->
    <div class="align-items-center mb-n3">
    <p class="text-uppercase text-xs text-dark font-weight-bolder">Search Filters</p>
    <form id="filterForm" class="row gy-2 gx-2 align-items-center mb-1" method="get" action="#" autocomplete="off">
        <!-- Search -->
        <div class="col-12 col-md-2">
        <input type="search" id="q" name="q" value="{{ q or '' }}" class="form-control text-xs" placeholder="Student Name or ID...">
        </div>

        <!-- Gender -->
        <div class="col-6 col-md-2">
        <select class="form-select text-xs" name="gender" id="gender">
            <option value="">All Genders</option>
            {% for s in genders %}
            <option value="{{ s }}" {% if gender == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
        </div>

        <!-- Year group -->
        <div class="col-6 col-md-2">
        <select class="form-select text-xs" name="yrgrp" id="yrgrp">
            <option value="">All Year Groups</option>
            {% for s in yrgrps %}
            <option class="text-uppercase" value="{{ s }}" {% if yrgrp == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
        </div>

        <!-- Registration Status -->
        <div class="col-6 col-md-2">
        <select class="form-select text-xs" name="status" id="status">
            <option value="">All Registration Status</option>
            {% for s in statuses %}
            <option value="{{ s }}" {% if status == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
        </div>

        <!-- SEN/SPED -->
        <div class="col-6 col-md-2">
        <select class="form-select text-xs" name="sped" id="sped">
            <option value="">All SEN/SPED</option>
            {% for s in speds %}
            <option value="{{ s }}" {% if sped == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
        </div>

        <!-- Progress Category -->
        <div class="col-6 col-md-2">
        <select class="form-select text-xs" name="progress_category" id="progress_category">
            <option value="">All Progress</option>
            {% for s in progress_categories %}
            <option value="{{ s }}" {% if progress_category == s %}selected{% endif %}>{{ s }}</option>
            {% endfor %}
        </select>
        </div>

        <div class="col-12 d-flex gap-2">
            {% if segment == 'external data - NGRT (Form-B)' %}
                <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('home_blueprint.display_ngrtb') }}">Clear</a>
            {% else %}
                <a class="btn btn-outline-secondary btn-sm" href="{{ url_for('home_blueprint.display_ngrtc') }}">Clear</a>
            {% endif %}
        </div>
    </form>

    <!-- Filter chips -->
    {% if active_filters and active_filters|length %}
        <div class="d-flex align-items-center mb-3">
        <span class="text-uppercase text-xs text-muted me-2">Active Filters:</span>
        {% for label, value, url in active_filters %}
            <a class="badge rounded-pill text-bg-light text-decoration-none me-1" href="{{ url }}"> {{ label }}: {{ value }} &times;
            </a>
        {% endfor %}
        </div>
    {% endif %}
    </div>
</div>
