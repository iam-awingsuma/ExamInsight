{% extends "layouts/base.html" %}

{% block content %}
<!-- Dashboard tabs for different groups -->
<div class="ei-tabs-container mx-4 my-2">
  <div class="ei-tabs">
    <button class="ei-tab active" data-tab="internal">Internal</button>
    <button class="ei-tab" data-tab="ngrta">NGRT-A</button>
    <button class="ei-tab" data-tab="ngrtb">NGRT-B</button>
    <button class="ei-tab" data-tab="ngrtc">NGRT-C</button>
  </div>
</div>

<div id="section-internal" class="tab-section">
  <!-- Dasboard - Internal Assessment -->
  {% include "partials/dashboard_internal.html" %}
</div>

<div id="section-ngrta" class="tab-section d-none">
  <div class="p-3">📊 Sample text for NGRT-A</div>
</div>

<div id="section-ngrtb" class="tab-section d-none">
  <div class="p-3">📈 Sample text for NGRT-B</div>
</div>

<div id="section-ngrtc" class="tab-section d-none">
  <div class="p-3">📚 Sample text for NGRT-C</div>
</div>
{% endblock content %}

{% block extra_js %}
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <!-- Jinja data blobs -->
  <script id="chart-cohort-attainment" type="application/json">{{ threshold_data | default([]) | tojson | safe }}</script>
  <script id="chart-cohort-progress" type="application/json">{{ progress_simple_data | default([]) | tojson | safe }}</script>

  <!-- chart globals -->
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts/cohort_attainment.js') }}?v=3"></script>
  <script src="{{ url_for('static', filename='js/charts/cohort_progress.js') }}?v=3"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderCohortAttainment();
      renderCohortProgress();
    });
  </script>
{% endblock extra_js %}
