{% extends "layouts/base.html" %}

{% block content %}
<!-- Dashboard tabs for different groups -->
<div class="ei-tabs-container mx-4 my-2">
  <div class="ei-tabs">
    <button class="ei-tab active" data-tab="internal">Internal Assessment</button>
    <button class="ei-tab" data-tab="ngrt">New Group Reading Test (NGRT)</button>
  </div>
</div>

<div id="section-internal" class="tab-section">
  <!-- Dasboard - Internal Assessment -->
  {% include "partials/dashboard_internal.html" %}
</div>

<div id="section-ngrt" class="tab-section d-none">
  <div class="p-3">📊 Sample text for NGRT</div>
</div>

{% endblock content %}

{% block extra_js %}
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>

  <!-- Jinja data blobs -->
  <script id="chart-cohort-attainment" type="application/json">{{ threshold_data | default([]) | tojson | safe }}</script>
  <script id="chart-cohort-progress" type="application/json">{{ progress_simple_data | default([]) | tojson | safe }}</script>

  <!-- data blob for scatter plot is passed via window.internalScatterData in the script below -->
  <script>
    window.internalScatterData = {{ internal_scatter_data | tojson | safe }};
  </script>
  
  <!-- data blob for year-group average attainment chart -->
  <script>
    window.avgByYearData = {{ avg_attainment_by_year | tojson | safe }};
  </script>

  <!-- chart globals -->
  <script src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts/cohort_attainment.js') }}?v=3"></script>
  <script src="{{ url_for('static', filename='js/charts/cohort_progress.js') }}?v=3"></script>
  <script src="{{ url_for('static', filename='js/charts/dashboard_gr_distri_scatter.js') }}"></script>
  <script src="{{ url_for('static', filename='js/charts/dashboard_avg_att_yrgrp.js') }}"></script>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      renderCohortAttainment();
      renderCohortProgress();
      renderInternalScatter();
      renderYearGroupAttainment();
    });
  </script>
{% endblock extra_js %}
