{% extends "layouts/base.html" %}

{% block title %} Reports {% endblock %} 

<!-- Specific CSS goes HERE -->
{% block stylesheets %}{% endblock stylesheets %}

{% block content %}

<div class="container-fluid py-2">
  <div class="row">
    <div class="col-sm-12">
      <div class="col-sm-8">
        <div class="card">
          
          <div class="card-header">
            <div class="d-flex align-items-start gap-1">
              <img class="me-1 mt-n2" width="42" height="42" src="https://img.icons8.com/?size=100&id=93GdqgOETvkz&format=png&color=000000" 
                  alt="Edit User Information" title="Edit User Information"/>
              <h5>NGRT Cohort Report</h5>
            </div>
          </div>

          <form class="row" method="GET" action="{{ url_for('home_blueprint.download_ngrt_summary_report', exam='ngrtc') }}">
            <div class="card-block px-4">
              <div class="row">
                <div class="col-sm-12 mb-2">
                  <div class="form-group">
                      <button type="submit" class="btn btn-sm btn-primary shadow-2 mx-auto">Download NGRT-C Report</button>
                  </div>
                </div>
              </div>
            </div>
          </form>

          <form class="row" method="GET" action="{{ url_for('home_blueprint.download_ngrt_summary_report', exam='ngrtb') }}">
            <div class="card-block px-4">
              <div class="row">
                <div class="col-sm-12 mb-2">
                  <div class="form-group">
                      <button type="submit" class="btn btn-sm btn-primary shadow-2 mx-auto">Download NGRT-B Report</button>
                  </div>
                </div>
              </div>
            </div>
          </form>

          <form class="row" method="GET" action="{{ url_for('home_blueprint.download_ngrt_summary_report', exam='ngrta') }}">
            <div class="card-block px-4">
              <div class="row">
                <div class="col-sm-12 mb-2">
                  <div class="form-group">
                      <button type="submit" class="btn btn-sm btn-primary shadow-2 mx-auto">Download NGRT-A Report</button>
                  </div>
                </div>
              </div>
            </div>
          </form>

        </div>
      </div>   
    </div>
  </div>
</div>
{% endblock content %}
