
{% extends "layouts/base.html" %}

{% block title %} Internal Assessment - Final Term{% endblock %}

{% block content %}
<div class="container-fluid py-2">
  {% if current_user.is_admin %}
    <section class="min-vh-25 mb-3">
      <div class="page-header align-items-start min-vh-25 pt-5 pb-11 m-3 border-radius-lg" style="background-image: url('{{ url_for('static', filename='assets/img/curved-images/amara14.png') }}');">
        <span class="mask bg-gradient-dark opacity-6"></span>
      </div>    
      <div class="container">
        <div class="row mt-lg-n11 mt-md-n10 mt-n9">
          <div class="col-xl-8 col-lg-9 col-md-9 mx-auto">
            <div class="card z-index-0">
              <div class="card-header text-center pt-3 mb-n3">
                <h5>Upload CSV File for Internal Assessment Data (Final Term)</h5>
              </div>
              <div class="card-body text-center pt-4">
                <form method="post" action="#" enctype="multipart/form-data">
                  <div class="form-group">
                    <input class="form-control form-control-sm w-75 mb-4 mx-auto" type="file" name="file" accept=".csv">
                    <input class="btn btn-sm btn-primary shadow-2 mx-auto" type="submit" value="Upload">
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
  {% endif %}
    <h5>Internal Assessment Data | Final Term</h5>
</div>

{% endblock content %}
